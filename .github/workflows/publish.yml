name: Publish to PyPI

# Triggered on a semver tag push (e.g. v0.1.0). The `ci` job calls
# the package's CI workflow as a reusable workflow — imports + build +
# install-matrix + tests must all pass on the tag's SHA before build and
# publish run. Upload uses PyPI trusted publishing via OIDC, not an API token.
#
# Trusted publisher binding on PyPI:
#   project:     kestrel-feature-wallet
#   owner:       KestrelSovereignAI
#   repository:  kestrel-feature-wallet
#   workflow:    publish.yml
#   environment: pypi

on:
  push:
    tags: ['v[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag or commit to publish (e.g. v0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ inputs.ref || github.ref }}
    secrets: inherit

  build:
    name: Build sdist + wheel
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Build
        run: uv build
      - name: Verify the version metadata matches the tag
        if: startsWith(inputs.ref, 'v') || startsWith(github.ref, 'refs/tags/v')
        env:
          INPUT_REF: ${{ inputs.ref }}
        run: |
          if [ -n "$INPUT_REF" ]; then
            TAG_NAME="$INPUT_REF"
          else
            TAG_NAME="$GITHUB_REF_NAME"
          fi
          TAG_VERSION="${TAG_NAME#v}"
          PKG_VERSION=$(uv run --no-project python -c "import tomllib; print(tomllib.loads(open('pyproject.toml').read())['project']['version'])")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag $TAG_NAME does not match pyproject.toml version $PKG_VERSION"
            exit 1
          fi
          echo "tag $TAG_NAME matches pyproject.toml version $PKG_VERSION"
      - name: Show artifacts
        run: ls -la dist/
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: Upload to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
