name: kestrel-feature-wallet CI

on:
  push:
    branches:
      - main
      - 'feat/*'
      - 'fix/*'
      - 'release/*'
      - 'codex/*'
  pull_request:
    branches: [main]
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: 'Tag or commit to test (passed through from publish.yml so the CI gate runs on the same SHA the build job will check out)'
        required: false
        type: string

env:
  PYTHON_VERSION: "3.13"

jobs:
  lint-and-imports:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install package + test extras
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          . .venv/bin/activate
          uv pip install -e '.[test]'
      - name: Validate package imports
        run: |
          . .venv/bin/activate
          python -c "
          from kestrel_feature_wallet import WalletFeature, WalletAgent, Currency
          import importlib.metadata as md
          eps = md.entry_points(group='kestrel_sovereign.features')
          names = [e.name for e in eps]
          assert 'WalletFeature' in names, f'Entry-point not registered: {names}'
          print('kestrel_feature_wallet imports OK; feature class:', WalletFeature.__name__, WalletAgent.__name__, Currency.FIL.value)
          "
        timeout-minutes: 3

  build-check:
    runs-on: ubuntu-latest
    needs: lint-and-imports
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Build sdist + wheel
        run: uv build
      - name: Inspect wheel contents
        run: |
          set -e
          WHEEL=$(ls dist/*.whl | head -1)
          echo "Inspecting $WHEEL"
          uv run --no-project python -c "
          import sys, zipfile
          z = zipfile.ZipFile('$WHEEL')
          names = z.namelist()
          forbidden = [n for n in names if n.startswith('kestrel_sovereign/') or n.startswith('kestrel_sdk/')]
          if forbidden:
              print('ERROR: wheel contains framework/SDK content:', forbidden, file=sys.stderr)
              sys.exit(1)
          required = [
              'kestrel_feature_wallet/__init__.py',
              'kestrel_feature_wallet/wallet_feature.py',
              'kestrel_feature_wallet/feature.py',
              'kestrel_feature_wallet/onramp/stripe_onramp.py',
              'kestrel_feature_wallet/onramp/webhook_handler.py',
              'kestrel_feature_wallet/component.yaml',
          ]
          missing = [m for m in required if m not in names]
          if missing:
              print('ERROR: wheel missing expected files:', missing, file=sys.stderr)
              sys.exit(1)
          print(f'Wheel OK ({len(names)} entries)')
          "

  install-check:
    runs-on: ubuntu-latest
    needs: build-check
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Clean install + smoke test
        run: |
          uv venv --python ${{ matrix.python-version }} .venv-test
          . .venv-test/bin/activate
          uv pip install .
          python -c "
          from kestrel_feature_wallet import WalletFeature, WalletAgent, Currency
          import importlib.metadata as md
          eps = md.entry_points(group='kestrel_sovereign.features')
          names = [e.name for e in eps]
          assert 'WalletFeature' in names, f'Entry-point not registered: {names}'
          print(f'kestrel-feature-wallet installs + entry-point OK on Python ${{ matrix.python-version }}')
          "

  test:
    runs-on: ubuntu-latest
    needs: lint-and-imports
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}
      - name: Install + run pytest
        run: |
          uv venv --python ${{ env.PYTHON_VERSION }} .venv
          . .venv/bin/activate
          uv pip install -e '.[test]'
          uv run --no-sync pytest tests/ -v --tb=short
        timeout-minutes: 10
